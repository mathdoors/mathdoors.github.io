<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Math Doors</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
/* ======================================================
   GLOBAL STYLE
====================================================== */
html,body{
margin:0;
height:100%;
background:#000;
font-family:'Press Start 2P', monospace;
color:white;
overflow:hidden;
}

#title{
position:absolute;
top:70px;
width:100%;
text-align:center;
font-size:58px;
color:#00ffff;
text-shadow:0 0 15px #00ffff,0 0 40px #00ffff;
}

/* ======================================================
   HUD
====================================================== */
#lives{
position:absolute;
top:25px;
left:25px;
display:flex;
gap:12px;
}

.heart{
width:32px;
height:32px;
background:red;
clip-path:polygon(50% 100%,0% 40%,0% 25%,25% 0%,50% 20%,75% 0%,100% 25%,100% 40%);
box-shadow:0 0 10px red;
transition:.3s;
}

.dead{
filter:grayscale(1);
opacity:.25;
transform:scale(.8);
box-shadow:none;
}

#score{
position:absolute;
top:25px;
right:25px;
font-size:24px;
}

/* ======================================================
   GRADE SELECTOR (LEFT PANEL)
====================================================== */
#gradePanel{
position:absolute;
left:70px;
top:180px;
display:flex;
flex-direction:column;
gap:18px;
}

.gradeBox{
padding:18px 22px;
border:3px solid #555;
cursor:pointer;
transition:.2s;
color:#888;
}

.gradeBox:hover{
transform:scale(1.05);
}

.gradeSelected{
color:#00ffff;
border-color:#00ffff;
box-shadow:0 0 18px #00ffff;
}

/* ======================================================
   DOORS
====================================================== */
#doors{
position:relative;
bottom:0;
width:100%;
height:78vh;
display:flex;
justify-content:center;
align-items:flex-end;
gap:180px;
perspective:1800px;
}

.door{
  min-width:220px;
}

#doors{
  flex-wrap:wrap;
}

.door{
  width:24vw;
  max-width:420px;
  aspect-ratio:420/650;
  position:relative;
  cursor:pointer;
  transition:transform .25s;
  transform-style:preserve-3d;
}

#doors{
  gap:4vw;
}

.door:not(.open):hover{
  transform:translateY(-1.5vw) scale(1.05);
}

.door::before{
content:"";
position:absolute;
inset:0;
border:14px solid #eee;
background:#111;
}

.panel{
position:absolute;
inset:10%;
background:repeating-linear-gradient(90deg,#3b2a14 0,#3b2a14 10px,#4a361b 10px,#4a361b 20px);
border:6px solid black;
}

.handle{
position:absolute;
right:28px;
top:50%;
width:18px;
height:18px;
background:gold;
border-radius:50%;
transform:translateY(-50%);
box-shadow:0 0 14px gold;
}

.label{
position:absolute;
bottom:-70px;
width:100%;
text-align:center;
font-size:20px;
}

.green{box-shadow:0 0 35px #00ff88;}
.yellow{box-shadow:0 0 35px #ffd000;}
.red{box-shadow:0 0 35px #ff003c;}

.green .label{color:#00ff88;text-shadow:0 0 15px #00ff88;}
.yellow .label{color:#ffd000;text-shadow:0 0 15px #ffd000;}
.red .label{color:#ff003c;text-shadow:0 0 15px #ff003c;}

.open{animation:openDoor .55s forwards ease-in;transform-origin:left center;}
@keyframes openDoor{0%{transform:rotateY(0);}100%{transform:rotateY(-65deg);} }

/* ======================================================
   GAME AREA
====================================================== */
#gameArea{display:none;text-align:center;margin-top:240px;}
#question{font-size:38px;margin-bottom:35px;}

input{
font-family:'Press Start 2P';
font-size:26px;
padding:12px;
width:320px;
text-align:center;
background:black;
color:#00ffcc;
border:4px solid #00ffcc;
}

#timer{margin-top:25px;font-size:24px;color:#ffd000;}

/* ======================================================
   GAME OVER + AD POPUP PLACEHOLDER
====================================================== */
#gameOver{display:none;text-align:center;margin-top:220px;font-size:48px;color:#ff003c;}

#restartBtn{
margin-top:40px;
font-family:'Press Start 2P';
font-size:18px;
padding:14px 28px;
background:black;
color:#00ffff;
border:4px solid #00ffff;
cursor:pointer;
}

#adPopup{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.8);
align-items:center;
justify-content:center;
}

#adBox{
background:#111;
padding:40px;
border:4px solid #00ffff;
text-align:center;
}

/* ======================================================
   FLASH TRANSITION
====================================================== */
#transitionFlash{
position:fixed;
inset:0;
background:white;
opacity:0;
pointer-events:none;
z-index:999;
}

.flashActive{animation:screenFlash .25s ease;}
@keyframes screenFlash{0%{opacity:0;}50%{opacity:1;}100%{opacity:0;}}
</style>

</head>

====================================================== */
function rand(min, max){
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function pick(arr){
  return arr[Math.floor(Math.random() * arr.length)];
}

/* ======================================================
   SOUND
====================================================== */
const ctx = new (window.AudioContext||window.webkitAudioContext)();

function beep(freq,dur,type='square'){
  const o = ctx.createOscillator();
  const g = ctx.createGain();
  o.type = type;
  o.frequency.value = freq;
  o.connect(g);
  g.connect(ctx.destination);
  g.gain.value = 0.08;
  o.start();
  setTimeout(()=>o.stop(),dur);
}

/* ======================================================
   GRADE SELECTOR
====================================================== */
const gradePanel=document.getElementById('gradePanel');

for(let i=1;i<=9;i++){
  const box=document.createElement('div');
  box.className='gradeBox'+(i===1?' gradeSelected':'');
  box.innerText='GRADE '+i;
  box.onclick=()=>selectGrade(i);
  gradePanel.appendChild(box);
}

function selectGrade(g){

if(gameLocked) return;

currentGrade = g;

document.querySelectorAll('.gradeBox')
.forEach(b=>b.classList.remove('gradeSelected'));

gradePanel.children[g-1]
.classList.add('gradeSelected');

restartGame();
}

/* ======================================================
   GAME FLOW
====================================================== */
function startGame(e, level){

if(gameLocked) return;
gameLocked = true;

ctx.resume();

difficulty = level;
beep(600,120);

const door = e.currentTarget;

/* FORCE animation reset */
door.classList.remove('open');
void door.offsetWidth; // reflow trick
door.classList.add('open');

setTimeout(()=>{
screenFlash();
doors.style.display='none';
gameArea.style.display='block';
generateQuestion();
startTimer();
answer.focus();
gameLocked = false;
},550);
}

function startTimer(){

clearInterval(timer);

timeLeft = 15;
startTime = Date.now();
updateTimer();

timer = setInterval(()=>{
if(gameLocked) return;

timeLeft--;
updateTimer();

if(timeLeft <= 0){
clearInterval(timer);
loseLife();
}
},1000);
}

function normalize(val){
return val
.toString()
.toLowerCase()
.replace(/\s+/g,'')       // remove spaces
.replace(/\.0+$/,'')      // remove trailing .0
.replace(/^0+/,'0');      // normalize leading zeros
}

function normalize(val){
return val
.toString()
.toLowerCase()
.replace(/\s+/g,'')
.replace('remainder','r')
.replace(/\.0+$/,'');
}

function updateTimer(){
timerEl.innerText='TIME: '+timeLeft;
}

/* ======================================================
   QUESTIONS
====================================================== */
function generateQuestion(){

const level =
difficulty==='green'?'easy':
difficulty==='yellow'?'medium':'hard';

const q = CURRICULUM[currentGrade][level].generate();

question.innerText=q[0];
currentAnswer=String(q[1]).toLowerCase();
}

/* ======================================================
   ANSWERS
====================================================== */
function submitAnswer(){

if(gameLocked) return;

const val = normalize(answer.value);
if(val==="") return;

gameLocked = true;

if(val === normalize(currentAnswer)){
  correct();
}else{
  loseLife();
}
}

function correct(){

clearInterval(timer);
beep(1000,120);

const t = (Date.now() - startTime)/1000;

const base =
difficulty==='green'?25:
difficulty==='yellow'?100:250;

const mult = t<6?2:(t<11?1.5:1);

score += Math.floor(base*mult);
scoreEl.innerText='SCORE: '+score;

setTimeout(()=>{
  backToDoors();
  gameLocked = false;
},250);
}

function loseLife(){

if(gameLocked) return;
gameLocked = true;

clearInterval(timer);
beep(150,400,'sawtooth');

lives--;

if(lives >= 0 && hearts[lives]){
  hearts[lives].classList.add('dead');
}

if(lives <= 0){
  lives = 0; // clamp
  endGame();
}else{
  setTimeout(()=>{
    backToDoors();
    gameLocked = false;
  },250);
}
}

/* ======================================================
   GAME OVER
====================================================== */
function endGame(){

const key='highscore_grade_'+currentGrade;
let best=localStorage.getItem(key)||0;

if(score>best){
localStorage.setItem(key,score);
best=score;
}

highScoreText.innerText=
'BEST (GRADE '+currentGrade+'): '+best;

gameArea.style.display='none';
gameOver.style.display='block';
adPopup.style.display='flex';
}

function closeAd(){
adPopup.style.display='none';
}

/* ======================================================
   RESET
====================================================== */
function restartGame(){

clearInterval(timer);

score=0;
lives=3;
difficulty=null;

scoreEl.innerText='SCORE: 0';
hearts.forEach(h=>h.classList.remove('dead'));

gameOver.style.display='none';
gameArea.style.display='none';
doors.style.display='flex';

answer.value='';
}

/* ======================================================
   RETURN TO DOORS
====================================================== */
function backToDoors(){

gameArea.style.display='none';
doors.style.display='flex';

document.querySelectorAll('.door')
.forEach(d=>d.classList.remove('open'));

answer.value='';
}

/* ======================================================
   FLASH
====================================================== */
const flash=document.getElementById('transitionFlash');

function screenFlash(){
flash.classList.add('flashActive');
setTimeout(()=>flash.classList.remove('flashActive'),250);
}

function generateQuestion(){

const level =
difficulty==='green'?'easy':
difficulty==='yellow'?'medium':'hard';

if(!CURRICULUM[currentGrade] || !CURRICULUM[currentGrade][level]){
  console.error("Curriculum error");
  return;
}

const q = CURRICULUM[currentGrade][level].generate();

question.innerText = q[0];
currentAnswer = String(q[1]);
}

/* ======================================================
   ELEMENT REFS
====================================================== */
const doors=document.getElementById('doors');
const question=document.getElementById('question');
const answer=document.getElementById('answer');
const timerEl=document.getElementById('timer');
const scoreEl=document.getElementById('score');
const gameArea=document.getElementById('gameArea');
const gameOver=document.getElementById('gameOver');
const adPopup=document.getElementById('adPopup');
const highScoreText=document.getElementById('highScoreText');
</script>
